name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: gofmt -l . | tee /tmp/gofmt.out && test ! -s /tmp/gofmt.out
      - run: go vet ./...
      - run: go test -race ./... -count=1

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: apps/dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  compose:
    name: Compose validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp configs/.env.example .env
      - run: docker compose config --quiet
      - run: bash -n scripts/quickstart.sh

  mysql-integration:
    name: MySQL Integration
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ddag_test_password
          MYSQL_DATABASE: ddag_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -pddag_test_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go test -v -tags=integration -count=1 ./internal/connectors/ -run TestMySQLConnectorIntegration
        env:
          DDAG_INTEGRATION_MYSQL_PASSWORD: "ddag_test_password"

  sqlserver-integration:
    name: SQL Server Integration
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "DdagTestPassword123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd="/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P DdagTestPassword123! -Q 'SELECT 1'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go test -v -tags=integration -count=1 ./internal/connectors/ -run TestSQLServerConnectorIntegration
        env:
          DDAG_INTEGRATION_MSSQL_PASSWORD: "DdagTestPassword123!"

  oracle-integration:
    name: Oracle Integration
    runs-on: ubuntu-latest
    services:
      oracle:
        image: gvenzl/oracle-xe:21-slim
        env:
          ORACLE_RANDOM_PASSWORD: true
          APP_USER: ddag_test
          APP_USER_PASSWORD: ddag_test_password
        ports:
          - 1521:1521
        options: >-
          --health-cmd="healthcheck.sh"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go test -v -tags=integration -count=1 ./internal/connectors/ -run TestOracleConnectorIntegration
        env:
          DDAG_INTEGRATION_ORACLE_PASSWORD: "ddag_test_password"
