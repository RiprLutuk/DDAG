name: Bug report
description: Report a reproducible problem in DDAG
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve DDAG. Never include credentials, tokens, or unredacted SQL data.
  - type: input
    id: version
    attributes:
      label: DDAG version or commit
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options: [Docker Compose, systemd/Caddy, Kubernetes, source/development, other]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the smallest reproducible sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and redacted logs
    validations:
      required: true
  - type: input
    id: request_id
    attributes:
      label: Request ID (if available)
      placeholder: req-...
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed credentials, access tokens, database secrets, and sensitive data.
          required: true
        - label: I searched existing issues for duplicates.
          required: true
