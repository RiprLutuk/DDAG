{{- if .Values.pdb.enabled }}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled (gt (int (default 1 $svc.replicas)) 1) }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ include "ddag.namespace" $ }}
  labels:
    app: {{ $name }}
    {{- include "ddag.labels" $ | nindent 4 }}
spec:
  minAvailable: {{ $.Values.pdb.minAvailable }}
  selector:
    matchLabels:
      app: {{ $name }}
{{- end }}
{{- end }}
{{- end }}
