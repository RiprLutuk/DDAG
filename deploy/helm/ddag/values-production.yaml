services:
  admin-backend: { replicas: 1 }
  auth-service: { replicas: 1, hpa: { enabled: false, minReplicas: 1, maxReplicas: 2, cpu: 70 } }
  api-gateway: { replicas: 2, hpa: { enabled: true, minReplicas: 2, maxReplicas: 6, cpu: 70 } }
  policy-engine: { replicas: 1, hpa: { enabled: false, minReplicas: 1, maxReplicas: 3, cpu: 70 } }
  cache-service: { replicas: 1, hpa: { enabled: false, minReplicas: 1, maxReplicas: 3, cpu: 70 } }
  worker: { replicas: 1 }
  connector-postgres: { replicas: 2, hpa: { enabled: true, minReplicas: 1, maxReplicas: 6, cpu: 70 } }
  connector-mysql: { replicas: 1, hpa: { enabled: true, minReplicas: 1, maxReplicas: 4, cpu: 70 } }
  connector-oracle: { replicas: 1, hpa: { enabled: true, minReplicas: 1, maxReplicas: 4, cpu: 70 } }
  connector-sqlserver: { replicas: 1, hpa: { enabled: true, minReplicas: 1, maxReplicas: 4, cpu: 70 } }
