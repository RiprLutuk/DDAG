apiVersion: v1
kind: ConfigMap
metadata:
  name: ddag-config
  namespace: ddag
data:
  DDAG_ENV: "prod"
  DDAG_LOG_LEVEL: "info"
  # External metadata DB (not deployed in-cluster — connected from outside).
  DDAG_DB_HOST: "metadata-postgres.example.internal"
  DDAG_DB_PORT: "5432"
  DDAG_DB_USER: "ddag"
  DDAG_DB_NAME: "ddag"
  DDAG_DB_SSLMODE: "require"
  DDAG_REDIS_ADDR: "ddag-redis:6379"
  DDAG_TOKEN_ISSUER: "https://ddag.example.com"
  DDAG_JWKS_URL: "http://auth-service:8081/.well-known/jwks.json"
  DDAG_POLICY_MODE: "inprocess"
  DDAG_CACHE_MODE: "inprocess"
  DDAG_SESSION_COOKIE_SECURE: "true"
  DDAG_DASHBOARD_ORIGINS: "https://ddag.example.com"
  DDAG_CONNECTOR_POSTGRES_URL: "http://connector-postgres:8090"
  DDAG_CONNECTOR_MYSQL_URL: "http://connector-mysql:8091"
  DDAG_CONNECTOR_ORACLE_URL: "http://connector-oracle:8092"
  DDAG_CONNECTOR_SQLSERVER_URL: "http://connector-sqlserver:8093"
