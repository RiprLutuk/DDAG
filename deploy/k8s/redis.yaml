apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddag-redis
  namespace: ddag
  labels: { app: ddag-redis }
spec:
  replicas: 1
  selector: { matchLabels: { app: ddag-redis } }
  template:
    metadata: { labels: { app: ddag-redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports: [ { containerPort: 6379 } ]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: ddag-redis
  namespace: ddag
spec:
  selector: { app: ddag-redis }
  ports: [ { port: 6379, targetPort: 6379 } ]
