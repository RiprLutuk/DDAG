---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-backend
  namespace: ddag
  labels: { app: admin-backend, app.kubernetes.io/part-of: ddag }
spec:
  replicas: 1
  selector: { matchLabels: { app: admin-backend } }
  template:
    metadata:
      labels: { app: admin-backend }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: admin-backend
          image: ddag-admin-backend:latest
          imagePullPolicy: IfNotPresent
          ports: [ { containerPort: 8080 } ]
          envFrom:
            - configMapRef: { name: ddag-config }
            - secretRef: { name: ddag-secrets }
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
