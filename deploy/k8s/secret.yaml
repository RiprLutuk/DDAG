apiVersion: v1
kind: Secret
metadata:
  name: ddag-secrets
  namespace: ddag
type: Opaque
stringData:
  # openssl rand -base64 32
  DDAG_MASTER_KEY: "REPLACE_WITH_BASE64_32_BYTES"
  DDAG_SESSION_SECRET: "REPLACE_WITH_RANDOM_SECRET"
  DDAG_SUPERADMIN_PASSWORD: "REPLACE_WITH_STRONG_SUPERADMIN_PASSWORD"
  DDAG_INTERNAL_AUTH_SECRET: "REPLACE_WITH_RANDOM_INTERNAL_HMAC_SECRET"
  DDAG_DB_PASSWORD: "REPLACE_WITH_DB_PASSWORD"
