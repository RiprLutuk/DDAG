# Prometheus scrape config for DDAG. Every service exposes /metrics.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ddag-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - admin-backend:8080
          - auth-service:8081
          - api-gateway:8082
          - policy-engine:8083
          - cache-service:8084
          - worker:8085
          - connector-postgres:8090
          - connector-mysql:8091
          - connector-oracle:8092
          - connector-sqlserver:8093
        labels:
          platform: ddag
