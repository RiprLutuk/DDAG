# DDAG local WAL archive for PostgreSQL PITR.
# archive_mode requires a PostgreSQL restart; the other values reload safely.
archive_mode = on
archive_command = 'test -f /var/lib/postgresql/18/wal-archive/%f || cp %p /var/lib/postgresql/18/wal-archive/%f'
archive_timeout = '5min'
# Restore command is intentionally not set on the live primary. Set it only in an
# isolated recovery target via postgresql.conf/recovery configuration.
# restore_command = 'cp /var/lib/postgresql/18/wal-archive/%f %p'
